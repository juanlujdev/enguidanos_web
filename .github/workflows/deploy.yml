name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows:
      - "Procesar agenda desde Telegram (scan)"
      - "Confirmar evento desde Telegram"
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Cuando lo dispara el bot (workflow_run), solo desplegar si eventos.json cambió.
      # Cuando lo dispara un push humano, desplegar siempre.
      - name: Verificar si el deploy es necesario
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if git diff HEAD~1 HEAD --name-only | grep -q "public/data/eventos.json"; then
              echo "needed=true" >> $GITHUB_OUTPUT
            else
              echo "needed=false" >> $GITHUB_OUTPUT
              echo "eventos.json no cambió — deploy omitido."
            fi
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.needed == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.gate.outputs.needed == 'true'

      - run: npm run build
        if: steps.gate.outputs.needed == 'true'

      - uses: actions/configure-pages@v5
        if: steps.gate.outputs.needed == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.gate.outputs.needed == 'true'
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        if: steps.gate.outputs.needed == 'true'
        id: deployment
